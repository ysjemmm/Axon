<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- 背景圆：深蓝黑底 -->
  <circle cx="256" cy="256" r="256" fill="#0f172a"/>
  
  <!-- 核心：大发光圆（突触体） -->
  <circle cx="256" cy="256" r="56" fill="url(#core-glow)"/>
  <!-- 核心内圈高光 -->
  <circle cx="256" cy="256" r="32" fill="url(#core-inner)"/>
  
  <!-- 轴突分支：粗线条 -->
  <!-- 右上 -->
  <path d="M296 216 L350 162 L388 138" stroke="url(#branch-gradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="388" cy="138" r="14" fill="#38bdf8"/>
  
  <!-- 右 -->
  <path d="M312 256 L374 252 L412 236" stroke="url(#branch-gradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="412" cy="236" r="12" fill="#38bdf8" opacity="0.85"/>
  
  <!-- 右下 -->
  <path d="M296 296 L348 348 L380 380" stroke="url(#branch-gradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="380" cy="380" r="14" fill="#38bdf8"/>
  
  <!-- 左上 -->
  <path d="M216 216 L162 162 L128 136" stroke="url(#branch-gradient-r)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="128" cy="136" r="13" fill="#a78bfa"/>
  
  <!-- 左 -->
  <path d="M200 256 L138 260 L100 276" stroke="url(#branch-gradient-r)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="276" r="12" fill="#a78bfa" opacity="0.85"/>
  
  <!-- 左下 -->
  <path d="M216 296 L164 348 L134 376" stroke="url(#branch-gradient-r)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="134" cy="376" r="13" fill="#a78bfa"/>
  
  <!-- 上 -->
  <path d="M256 200 L260 140 L272 100" stroke="url(#branch-gradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="272" cy="100" r="11" fill="#38bdf8" opacity="0.8"/>
  
  <!-- 下 -->
  <path d="M256 312 L252 372 L240 412" stroke="url(#branch-gradient-r)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="240" cy="412" r="11" fill="#a78bfa" opacity="0.8"/>

  <!-- 信号脉冲点 -->
  <circle cx="330" cy="182" r="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="374" cy="252" r="5" fill="#ffffff" opacity="0.7"/>
  <circle cx="162" cy="162" r="5.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="260" cy="164" r="5" fill="#ffffff" opacity="0.7"/>
  <circle cx="330" cy="348" r="5" fill="#ffffff" opacity="0.75"/>
  <circle cx="164" cy="348" r="5" fill="#ffffff" opacity="0.7"/>
  
  <!-- 渐变定义 -->
  <defs>
    <!-- 核心外圈发光 -->
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="70%" stop-color="#4f46e5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    
    <!-- 核心内圈 -->
    <radialGradient id="core-inner" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </radialGradient>
    
    <!-- 右侧分支渐变 -->
    <linearGradient id="branch-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    
    <!-- 左侧分支渐变 -->
    <linearGradient id="branch-gradient-r" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
