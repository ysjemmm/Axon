name: Build & Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package:
    name: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Package VSIX
        run: pnpm run package
        working-directory: apps/vscode-extension

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axon-ide-${{ matrix.os }}
          path: apps/vscode-extension/axon-ide.vsix
